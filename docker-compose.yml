name: ledgercart

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ledgercart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgercart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledgercart-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgercart-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ledgercart
      SECRET_KEY: 77bdd0aca2bfca3c4dc886a155b931cc4b9d5e2c428cf9bb48988ed1a2aecf77
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      UPLOAD_DIR: uploads
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:8081,http://app.ledgercart.local,http://console.ledgercart.local
      ENVIRONMENT: production
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ledgercart-network

  # App Frontend (store + admin panel) — port 80
  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
    container_name: ledgercart-app
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ledgercart-network

  # Console Frontend (LedgerCart platform ops panel) — port 8081
  console-frontend:
    build:
      context: ./console-frontend
      dockerfile: Dockerfile
    container_name: ledgercart-console
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ledgercart-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  ledgercart-network:
    driver: bridge
