server {
    listen 80;
    server_name localhost console.ledgercart.local;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';" always;

    # Health check endpoint
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Only proxy /api/console/ — all other /api/ paths are blocked
    # Docker internal network + localhost only
    location /api/console/ {
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        # NOTE: In production, also add your office/VPN IP range here, then deny all
        # deny all;

        proxy_pass http://backend:8000/api/console/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Block all other backend API paths from this panel
    location /api/ {
        return 403;
    }

    # Block uploads access from console panel
    location /uploads/ {
        return 403;
    }

    # SPA fallback — React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
